# Run with `dart run ffigen --config ffigen.yaml`.
name: FfmpegLinuxPkgBindings
description: |
  Bindings for `src/ffmpeg_linux_pkg.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
compiler-opts:
  - "-I/home/thancoder/projects/plugins/ffmpeg_linux_pkg/src/ffmpeg_cpp_wrapper/include"

output: "lib/ffmpeg_linux_pkg_bindings_generated.dart"
headers:
  entry-points:
    - "src/ffmpeg_cpp_wrapper/include/libavcodec/avcodec.h"
    - "src/ffmpeg_cpp_wrapper/include/libavformat/avformat.h"
    - "src/ffmpeg_cpp_wrapper/include/libavutil/avutil.h"
    - "src/ffmpeg_cpp_wrapper/include/libswresample/swresample.h"
    - "src/ffmpeg_cpp_wrapper/include/libswscale/swscale.h"
    - "src/ffmpeg_cpp_wrapper/include/libavdevice/avdevice.h"
  include-directives:
    - "src/ffmpeg_cpp_wrapper/include/libavcodec/avcodec.h"
    - "src/ffmpeg_cpp_wrapper/include/libavformat/avformat.h"
    - "src/ffmpeg_cpp_wrapper/include/libavutil/avutil.h"
    - "src/ffmpeg_cpp_wrapper/include/libswresample/swresample.h"
    - "src/ffmpeg_cpp_wrapper/include/libswscale/swscale.h"
    - "src/ffmpeg_cpp_wrapper/include/libavdevice/avdevice.h"

ffi-native:
comments:
  style: any
  length: full
